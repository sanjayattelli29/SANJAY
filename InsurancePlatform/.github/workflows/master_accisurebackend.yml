name: Build and deploy ASP.Net Core app to Azure Web App - Accisurebackend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore API/API.csproj

      # Build project
      - name: Build project
        run: dotnet build API/API.csproj --configuration Release --no-restore

      # Publish project
      - name: Publish project
        run: dotnet publish API/API.csproj --configuration Release --output ./publish --no-build

      # Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Download build artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      # Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BB1B6171ACFE45459BA88EE45B64CB29 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C7E6E22BCB0C46D4A276B41758935BEE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_87D8C1F278EF4BEE9EA5B413AB97087B }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: Accisurebackend
          slot-name: Production
          package: .
