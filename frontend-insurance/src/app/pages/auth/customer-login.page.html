<div class="min-h-screen flex flex-col items-center justify-center p-6 bg-brand-gray">
    <div class="mb-8 flex items-center gap-2">
        <div class="w-8 h-8 bg-brand-orange rounded-full flex items-center justify-center font-bold text-lg text-white">
            I</div>
        <span
            class="text-xl font-black tracking-tight text-brand-navy underline decoration-brand-orange decoration-4">InsurancePlatform</span>
    </div>

    <div class="card w-full max-w-md shadow-xl border-none">
        <h2 class="text-2xl font-bold mb-2 text-center">Customer Login</h2>
        <p class="text-slate-500 text-sm text-center mb-8">Access your insurance dashboard and policies</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-brand-navy mb-2">Email Address</label>
                <input type="email" formControlName="emailId" placeholder="example@email.com" class="input-field"
                    [class.border-red-500]="loginForm.get('emailId')?.invalid && loginForm.get('emailId')?.touched">
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-bold text-brand-navy">Password</label>
                    <a href="#" class="text-xs text-brand-orange hover:underline">Forgot?</a>
                </div>
                <input type="password" formControlName="password" placeholder="••••••••" class="input-field"
                    [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            </div>

            <div *ngIf="errorMessage()" class="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-100">
                {{ errorMessage() }}
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn-primary w-full">
                {{ isLoading() ? 'Signing in...' : 'Sign In to Dashboard' }}
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center text-sm text-slate-500">
            New to InsurancePlatform? <a routerLink="/register"
                class="text-brand-orange font-bold hover:underline">Register now</a>
        </div>
    </div>

    <!-- Role Quick Links -->
    <div class="mt-8 flex gap-4 text-xs font-semibold text-slate-400">
        <a routerLink="/admin/login" class="hover:text-brand-navy transition-colors">Admin Portal</a>
        <span>|</span>
        <a routerLink="/agent/login" class="hover:text-brand-navy transition-colors">Agent Portal</a>
        <span>|</span>
        <a routerLink="/claims-officer/login" class="hover:text-brand-navy transition-colors">Claims Portal</a>
    </div>
</div>
