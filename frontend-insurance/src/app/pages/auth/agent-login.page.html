<div class="min-h-screen flex flex-col items-center justify-center p-6 bg-brand-gray text-slate-900 font-sans">
    <div class="mb-8 flex items-center gap-2">
        <div class="w-8 h-8 bg-brand-orange rounded-full flex items-center justify-center font-bold text-lg text-white">
            I</div>
        <span
            class="text-xl font-black tracking-tight text-brand-navy underline decoration-brand-orange decoration-4">AcciSure</span>
    </div>

    <div class="card w-full max-w-md shadow-xl border-none">
        <div class="mb-6 p-4 bg-orange-50 rounded-lg border-l-4 border-brand-orange">
            <h2 class="text-xl font-bold text-brand-navy">Agent Portal</h2>
            <p class="text-slate-500 text-xs text-balance">Access your insurance portal and policy portfolio.</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-brand-navy mb-2 uppercase tracking-wide">Agent Email</label>
                <input type="email" formControlName="emailId" placeholder="agent@insurance.com" class="input-field"
                    [class.border-red-500]="loginForm.get('emailId')?.invalid && loginForm.get('emailId')?.touched">
            </div>
            <div>
                <label class="block text-sm font-bold text-brand-navy mb-2 uppercase tracking-wide">Secure
                    Password</label>
                <div class="relative">
                    <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••" class="input-field pr-10"
                        [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <button type="button" (click)="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-green-600 transition-colors">
                        <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>

            <div *ngIf="errorMessage()" class="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-100">
                {{ errorMessage() }}
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn-primary w-full shadow-lg">
                {{ isLoading() ? 'Logging in...' : 'Enter Agent Dashboard' }}
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400">
            <a routerLink="/" class="hover:text-brand-orange hover:underline transition-colors">Return to Main Site</a>
        </div>
    </div>
</div>
